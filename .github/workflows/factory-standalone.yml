# Factory Island – Standalone Deploy
#
# Builds and deploys Factory Island as a standalone app.
#
# TODO before first use:
#   1. Create a GitHub environment "factory-standalone" with required secrets
#   2. Set secrets: DEPLOY_ACCESS_KEY, DEPLOY_SECRET, DEPLOY_BUCKET
#   3. Adjust aws-region if needed
#   4. Optionally replace S3 deploy with GitHub Pages, Cloudflare Pages, etc.

name: Factory Island standalone deploy

on:
  push:
    branches:
      - main
    paths:
      - "src/game/**"
      - "index.factory.html"
      - "vite.factory.config.ts"
      - "tsconfig.factory.json"
      - "public/factory/**"
      - ".github/workflows/**"
      - "package.json"
      - "yarn.lock"
  workflow_dispatch:

jobs:
  build-and-deploy:
    concurrency: factory-standalone-deploy
    environment: factory-standalone
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug after checkout
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la
          ls -la $GITHUB_WORKSPACE
          git branch --show-current
          git rev-parse HEAD
          git ls-files | head -n 50
          find $GITHUB_WORKSPACE -maxdepth 2 -name package.json
          find $GITHUB_WORKSPACE -maxdepth 2 -name tsconfig.factory.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        continue-on-error: true
        run: yarn install --frozen-lockfile

      - name: Debug workspace
        run: |
          pwd
          ls -la
          find . -name package.json
          find . -name tsconfig.factory.json

      - name: Type-check
        continue-on-error: true
        run: yarn tsc -p tsconfig.factory.json --noEmit

      - name: Build
        run: yarn build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          CI: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: factory-island-dist
          path: dist-factory/
          retention-days: 14

      # ── Deploy (S3 example — replace with your target) ──
